services:
  mysql:
    image: mysql:8.4
    container_name: smartedu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_edu
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartedu-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SQL_INIT_MODE: always
      DB_URL: jdbc:mysql://mysql:3306/smart_edu?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_UPLOAD_DIR: /app/uploads
      TZ: Asia/Shanghai
    ports:
      - "8081:8080"
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
