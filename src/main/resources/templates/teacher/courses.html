<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的课程 - 教师</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9fb; font-size: 13px; color: #666; }
        .inline-form { display: inline; }
        .btn-danger {
            padding: 4px 10px; background: #f56565; color: #fff; border: none;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .btn-sm {
            padding: 4px 10px; background: #667eea; color: #fff;
            border-radius: 4px; font-size: 12px; text-decoration: none;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <h2><a href="/home" style="color:#667eea;text-decoration:none;">智慧教育平台</a></h2>
    <div class="user-info">
        <a href="/teacher/dashboard">仪表盘</a>
        <a href="/home">返回首页</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h3>➕ 新建课程</h3>
        <form method="post" action="/teacher/courses" style="margin-top:14px;">
            <div class="form-group">
                <label>课程名</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>简介（选填）</label>
                <input type="text" name="description">
            </div>
            <button class="btn" type="submit" style="width:auto;padding:9px 24px;">创建</button>
        </form>
    </div>

    <div class="card">
        <h3>📋 我的课程</h3>
        <table style="margin-top:12px;">
            <thead><tr><th>ID</th><th>课程名</th><th>简介</th><th>操作</th></tr></thead>
            <tbody>
                <tr th:each="c : ${courses}">
                    <td th:text="${c.id}">1</td>
                    <td th:text="${c.title}">名</td>
                    <td th:text="${c.description}" style="color:#666;font-size:13px;">简介</td>
                    <td>
                        <a class="btn-sm" th:href="@{/teacher/courses/{id}(id=${c.id})}">管理章节</a>
                        <form class="inline-form" method="post"
                              th:action="@{/teacher/courses/{id}/delete(id=${c.id})}"
                              onsubmit="return confirm('确认删除该课程？章节也会一并删除');">
                            <button class="btn-danger" type="submit">删除</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(courses)}">
                    <td colspan="4" style="text-align:center;color:#888;">暂无课程</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
