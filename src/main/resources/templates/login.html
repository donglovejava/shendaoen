<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - 智慧教育平台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-box">
    <h1>智慧教育平台</h1>
    <p class="subtitle">登录你的账号继续学习</p>

    <div class="alert alert-error"    th:if="${param.error}">用户名或密码错误</div>
    <div class="alert alert-success"  th:if="${param.registered}">注册成功，请登录</div>
    <div class="alert alert-success"  th:if="${param.logout}">已安全退出</div>

    <form method="post" action="/login">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <button class="btn" type="submit">登 录</button>
    </form>
    <p class="text-link">还没账号？<a href="/register">去注册</a></p>
</div>
</body>
</html>
