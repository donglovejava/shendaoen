<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程列表 - 智慧教育平台</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
        .course-item { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 12px rgba(0,0,0,.08); transition: transform .15s; }
        .course-item:hover { transform: translateY(-4px); }
        .course-item h3 a { color: #333; text-decoration: none; }
        .course-item p { color: #666; font-size: 13px; margin-top: 8px; line-height: 1.6; }
    </style>
</head>
<body>
<nav class="navbar">
    <h2><a href="/home" style="color:#667eea;text-decoration:none;">智慧教育平台</a></h2>
    <div class="user-info"><a href="/home">返回首页</a></div>
</nav>
<div class="container">
    <div class="card">
        <h3>📚 全部课程</h3>
        <p style="color:#888;margin-top:6px;font-size:13px;">点击课程进入学习</p>
    </div>
    <div class="course-grid" style="margin-top: 20px;">
        <div class="course-item" th:each="c : ${courses}">
            <h3><a th:href="@{/courses/{id}(id=${c.id})}" th:text="${c.title}">课程名</a></h3>
            <p th:text="${c.description}">课程简介</p>
        </div>
        <div th:if="${#lists.isEmpty(courses)}" class="card">暂无课程</div>
    </div>
</div>
</body>
</html>
